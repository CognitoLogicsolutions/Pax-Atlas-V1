<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CognitoVault - Local Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1120;
      --fg: #e5e7eb;
      --accent: #38bdf8;
      --muted: #6b7280;
      --border: #1f2933;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    main {
      width: 100%;
      max-width: 640px;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.5rem 1.75rem;
      background: radial-gradient(circle at top left, #1f2937 0, #020617 55%, #000 100%);
      box-shadow:
        0 18px 45px rgba(0, 0, 0, 0.65),
        0 0 0 1px rgba(15, 23, 42, 0.9);
    }
    header {
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }
    .tagline {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      border: 1px solid rgba(56, 189, 248, 0.2);
      padding: 0.2rem 0.5rem;
      border-radius: 0.25rem;
      background: rgba(56, 189, 248, 0.05);
      margin-bottom: 1rem;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      background: rgba(255, 255, 255, 0.02);
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .stat-value {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent);
    }
    .action-btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 0.5rem;
      background: var(--accent);
      color: #000;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .action-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">Sovereign Active: UCC 1-308</div>
    <header>
      <h1>CognitoVault</h1>
      <p class="tagline">Local-First Decision Logging & AI Orchestration</p>
    </header>
    <div class="stats">
      <div class="stat-card">
        <p class="stat-label">Active Blocks</p>
        <p class="stat-value">12-Beam ISO</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Status</p>
        <p class="stat-value">Walk Phase</p>
      </div>
    </div>
    <button class="action-btn">Initialize Decision Sync</button>
  </main>
  <script src="app.js" defer></script>
</body>
</html>
